# "Out of the box", Instiki stores its data in sqlite3 database. Other options are listed below.

development:
    adapter: sqlite3
    database: db/development.db.sqlite3

test:
    adapter: sqlite3
    database: db/test.db.sqlite3

production:
    adapter: sqlite3
    database: db/production.db.sqlite3

# Instead of sqlite3, you might want to use MySQL/MariaDB.
# In that case, you would add 
#    gem 'trilogy'
# to your Gemfile, run `bundle install` again and adopt
# the below configuration instead of the one above.

#production:
#  adapter: trilogy
#  database: instiki
#  username: instiki
#  password: XXX
#  host: 127.0.0.1
#  port: 3306
#  encoding: utf8mb4

# Warning: The database defined as 'test' will be erased and
# re-generated from your development database when you run 'rake'.
# Do not set this db to the same as development or production.
mysql_example:
  adapter: trilogy
  database: instiki_test
  username: root
  password:
  socket: /path/to/your/mysql.sock

# PostgreSQL versions 7.4 - 8.2
#
# Get the C bindings:
#   gem install postgres
# or use the pure-Ruby bindings (the only know way on Windows):
#   gem install postgres-pr

postgresql_example:
  adapter: postgresql
  database: instiki_development
  username: instiki
  password:

  # Connect on a TCP socket.  Omitted by default since the client uses a
  # domain socket that doesn't need configuration.
  #host: remote-database
  #port: 5432

  # Schema search path.  The server defaults to $user,public
  #schema_search_path: myapp,sharedapp,public

  # Character set encoding.  The server defaults to sql_ascii.
  #encoding: UTF8

  # Minimum log levels, in increasing order:
  #   debug5, debug4, debug3, debug2, debug1,
  #   info, notice, warning, error, log, fatal, or panic
  # The server defaults to notice.
  #min_messages: warning
